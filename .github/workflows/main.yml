name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Forge MDK 1.21.11
        run: |
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.21.11-63.0.10/forge-1.21.11-63.0.10-mdk.zip" -o mdk.zip
          unzip -o mdk.zip -d mdktemp || true
          cp mdktemp/gradlew golemmod-forge/ 2>/dev/null || cp gradlew golemmod-forge/ 2>/dev/null || true
          cp mdktemp/gradlew.bat golemmod-forge/ 2>/dev/null || cp gradlew.bat golemmod-forge/ 2>/dev/null || true
          cp -r mdktemp/gradle golemmod-forge/ 2>/dev/null || cp -r gradle golemmod-forge/ 2>/dev/null || true
          chmod +x golemmod-forge/gradlew

      - name: Fix build.gradle
        run: |
          cat > golemmod-forge/build.gradle << 'EOF'
          buildscript {
              repositories {
                  maven { url = 'https://maven.minecraftforge.net' }
                  mavenCentral()
              }
              dependencies {
                  classpath 'net.minecraftforge.gradle:ForgeGradle:6.+'
              }
          }
          apply plugin: 'java'
          apply plugin: 'net.minecraftforge.gradle'
          group = 'com.golemmod'
          version = '1.0.0'
          java {
              toolchain.languageVersion = JavaLanguageVersion.of(21)
          }
          minecraft {
              mappings channel: 'official', version: '1.21.11'
          }
          dependencies {
              minecraft 'net.minecraftforge:forge:1.21.11-63.0.10'
          }
          EOF

      - name: Fix Java files
        run: |
          sed -i 's/import net.minecraftforge.event.level.LevelTickEvent/import net.minecraftforge.event.TickEvent/' golemmod-forge/src/main/java/com/golemmod/event/GolemSpawnEvent.java
          sed -i 's/LevelTickEvent.Post/TickEvent.LevelTickEvent/' golemmod-forge/src/main/java/com/golemmod/event/GolemSpawnEvent.java

      - name: Fix mods.toml
        run: |
          sed -i 's/versionRange="\[62,)"/versionRange="[63,)"/' golemmod-forge/src/main/resources/META-INF/mods.toml
          sed -i 's/versionRange="\[26.1,)"/versionRange="[1.21.11,)"/' golemmod-forge/src/main/resources/META-INF/mods.toml

      - name: Build
        run: |
          cd golemmod-forge
          ./gradlew jar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: golemmod
          path: golemmod-forge/build/libs/*.jar
