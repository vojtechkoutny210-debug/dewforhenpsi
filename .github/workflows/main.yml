name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Forge MDK
        run: |
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/26.1-62.0.9/forge-26.1-62.0.9-mdk.zip" -o mdk.zip
          unzip -o mdk.zip -d mdktemp || true
          cp mdktemp/gradlew golemmod-forge/ 2>/dev/null || cp gradlew golemmod-forge/ 2>/dev/null || true
          cp mdktemp/gradlew.bat golemmod-forge/ 2>/dev/null || cp gradlew.bat golemmod-forge/ 2>/dev/null || true
          cp -r mdktemp/gradle golemmod-forge/ 2>/dev/null || cp -r gradle golemmod-forge/ 2>/dev/null || true
          chmod +x golemmod-forge/gradlew

      - name: Downgrade Gradle to 8.8
        run: |
          sed -i 's/gradle-9.3.1-bin.zip/gradle-8.8-bin.zip/' golemmod-forge/gradle/wrapper/gradle-wrapper.properties

      - name: Fix build.gradle
        run: |
          cat > golemmod-forge/build.gradle << 'EOF'
          buildscript {
              repositories {
                  maven { url = 'https://maven.minecraftforge.net' }
                  mavenCentral()
              }
              dependencies {
                  classpath 'net.minecraftforge.gradle:ForgeGradle:6.+'
              }
          }
          apply plugin: 'java'
          apply plugin: 'net.minecraftforge.gradle'
          group = 'com.golemmod'
          version = '1.0.0'
          java {
              toolchain.languageVersion = JavaLanguageVersion.of(25)
          }
          minecraft {
              mappings channel: 'official', version: '26.1'
          }
          dependencies {
              minecraft 'net.minecraftforge:forge:26.1-62.0.9'
          }
          EOF

      - name: Build
        run: |
          cd golemmod-forge
          ./gradlew jar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: golemmod
          path: golemmod-forge/build/libs/*.jar
