name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Forge MDK 1.21.1
        run: |
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.21.1-52.0.47/forge-1.21.1-52.0.47-mdk.zip" -o mdk.zip
          unzip mdk.zip -d mdktemp
          cp mdktemp/gradlew golemmod-forge/
          cp mdktemp/gradlew.bat golemmod-forge/
          cp -r mdktemp/gradle golemmod-forge/
          chmod +x golemmod-forge/gradlew

      - name: Fix build.gradle
        run: |
          cat > golemmod-forge/build.gradle << 'EOF'
          buildscript {
              repositories {
                  maven { url = 'https://maven.minecraftforge.net' }
                  mavenCentral()
              }
              dependencies {
                  classpath 'net.minecraftforge.gradle:ForgeGradle:6.+'
              }
          }
          apply plugin: 'java'
          apply plugin: 'net.minecraftforge.gradle'
          group = 'com.golemmod'
          version = '1.0.0'
          java {
              toolchain.languageVersion = JavaLanguageVersion.of(21)
          }
          minecraft {
              mappings channel: 'official', version: '1.21.1'
          }
          dependencies {
              minecraft 'net.minecraftforge:forge:1.21.1-52.0.47'
          }
          EOF

      - name: Fix mods.toml
        run: |
          cat > golemmod-forge/src/main/resources/META-INF/mods.toml << 'EOF'
          modLoader="javafml"
          loaderVersion="[52,)"
          license="MIT"
          [[mods]]
              modId="golemmod"
              version="1.0.0"
              displayName="Golem Mod"
          [[dependencies.golemmod]]
              modId="forge"
              mandatory=true
              versionRange="[52,)"
              ordering="NONE"
              side="BOTH"
          [[dependencies.golemmod]]
              modId="minecraft"
              mandatory=true
              versionRange="[1.21.1,)"
              ordering="NONE"
              side="BOTH"
          EOF

      - name: Build
        run: |
          cd golemmod-forge
          ./gradlew jar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: golemmod
          path: golemmod-forge/build/libs/*.jar
