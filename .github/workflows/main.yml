name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Forge MDK 1.21.11
        run: |
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.21.11-61.1.5/forge-1.21.11-61.1.5-mdk.zip" -o mdk.zip
          unzip mdk.zip -d mdktemp
          cp mdktemp/gradlew golemmod-forge/
          cp mdktemp/gradlew.bat golemmod-forge/
          cp -r mdktemp/gradle golemmod-forge/
          chmod +x golemmod-forge/gradlew
          sed -i 's/gradle-9.3.1-bin.zip/gradle-8.8-bin.zip/' golemmod-forge/gradle/wrapper/gradle-wrapper.properties

      - name: Fix Java source files
        run: |
          mkdir -p golemmod-forge/src/main/java/com/golemmod/event
          mkdir -p golemmod-forge/src/main/java/com/golemmod/item

          cat > golemmod-forge/src/main/java/com/golemmod/GolemMod.java << 'EOF'
          package com.golemmod;
          import com.golemmod.event.GolemLavaEvent;
          import com.golemmod.event.GolemSpawnEvent;
          import com.golemmod.item.ModItems;
          import net.minecraftforge.common.MinecraftForge;
          import net.minecraftforge.fml.common.Mod;
          import net.minecraftforge.fml.javafmlmod.FMLJavaModLoadingContext;
          @Mod(GolemMod.MODID)
          public class GolemMod {
              public static final String MODID = "golemmod";
              public GolemMod(FMLJavaModLoadingContext context) {
                  context.getModEventBus().register(ModItems.class);
                  MinecraftForge.EVENT_BUS.register(new GolemSpawnEvent());
                  MinecraftForge.EVENT_BUS.register(new GolemLavaEvent());
              }
          }
          EOF

          cat > golemmod-forge/src/main/java/com/golemmod/item/ModItems.java << 'EOF'
          package com.golemmod.item;
          import com.golemmod.GolemMod;
          import net.minecraft.world.item.Item;
          import net.minecraftforge.eventbus.api.IEventBus;
          import net.minecraftforge.eventbus.api.SubscribeEvent;
          import net.minecraftforge.fml.event.lifecycle.FMLCommonSetupEvent;
          import net.minecraftforge.registries.DeferredRegister;
          import net.minecraftforge.registries.ForgeRegistries;
          import net.minecraftforge.registries.RegistryObject;
          public class ModItems {
              public static final DeferredRegister<Item> ITEMS =
                  DeferredRegister.create(ForgeRegistries.ITEMS, GolemMod.MODID);
              public static final RegistryObject<Item> ACTIVATOR_ROD =
                  ITEMS.register("activator_rod", () -> new Item(new Item.Properties().stacksTo(1)));
              public static final RegistryObject<Item> ACTIVATOR_FRAME =
                  ITEMS.register("activator_frame", () -> new Item(new Item.Properties().stacksTo(16)));
          }
          EOF

          cat > golemmod-forge/src/main/java/com/golemmod/event/GolemSpawnEvent.java << 'EOF'
          package com.golemmod.event;
          import net.minecraft.server.level.ServerLevel;
          import net.minecraft.world.entity.EntityType;
          import net.minecraft.world.entity.animal.IronGolem;
          import net.minecraft.world.entity.npc.Villager;
          import net.minecraft.world.phys.AABB;
          import net.minecraftforge.event.TickEvent;
          import net.minecraftforge.eventbus.api.SubscribeEvent;
          import java.util.HashMap;
          import java.util.List;
          import java.util.Map;
          import java.util.UUID;
          public class GolemSpawnEvent {
              private final Map<UUID, Long> spawnCooldowns = new HashMap<>();
              private static final int MAX_GOLEMS = 15;
              private static final int MIN_VILLAGERS = 3;
              private static final int SEARCH_RADIUS = 48;
              private static final long COOLDOWN_TICKS = 600L;
              @SubscribeEvent
              public void onLevelTick(TickEvent.LevelTickEvent event) {
                  if (event.phase != TickEvent.Phase.END) return;
                  if (!(event.level instanceof ServerLevel level)) return;
                  if (level.getGameTime() % 80 != 0) return;
                  List<Villager> allVillagers = level.getEntitiesOfClass(Villager.class, new AABB(-30000, -64, -30000, 30000, 320, 30000));
                  for (Villager villager : allVillagers) {
                      if (!isScared(villager)) continue;
                      List<Villager> nearbyScared = level.getEntitiesOfClass(Villager.class, villager.getBoundingBox().inflate(SEARCH_RADIUS)).stream().filter(this::isScared).toList();
                      if (nearbyScared.size() < MIN_VILLAGERS) continue;
                      UUID key = villager.getUUID();
                      long now = level.getGameTime();
                      if (spawnCooldowns.getOrDefault(key, 0L) > now) continue;
                      long existingGolems = level.getEntitiesOfClass(IronGolem.class, villager.getBoundingBox().inflate(SEARCH_RADIUS)).size();
                      long toSpawn = MAX_GOLEMS - existingGolems;
                      if (toSpawn <= 0) continue;
                      for (int i = 0; i < toSpawn; i++) {
                          Villager spawnNear = nearbyScared.get(i % nearbyScared.size());
                          spawnGolemNear(level, spawnNear);
                      }
                      spawnCooldowns.put(key, now + COOLDOWN_TICKS);
                      break;
                  }
              }
              private boolean isScared(Villager villager) {
                  return !villager.isTrading() && (villager.getTarget() != null || villager.getDeltaMovement().horizontalDistanceSqr() > 0.05);
              }
              private void spawnGolemNear(ServerLevel level, Villager near) {
                  double x = near.getX() + (level.random.nextDouble() - 0.5) * 10;
                  double z = near.getZ() + (level.random.nextDouble() - 0.5) * 10;
                  IronGolem golem = new IronGolem(EntityType.IRON_GOLEM, level);
                  golem.setPos(x, near.getY(), z);
                  golem.setPlayerCreated(false);
                  level.addFreshEntity(golem);
              }
          }
          EOF

          cat > golemmod-forge/src/main/java/com/golemmod/event/GolemLavaEvent.java << 'EOF'
          package com.golemmod.event;
          import net.minecraft.core.BlockPos;
          import net.minecraft.world.entity.ai.goal.Goal;
          import net.minecraft.world.entity.animal.IronGolem;
          import net.minecraft.world.level.block.Blocks;
          import net.minecraftforge.event.entity.EntityJoinLevelEvent;
          import net.minecraftforge.eventbus.api.SubscribeEvent;
          import java.util.EnumSet;
          public class GolemLavaEvent {
              @SubscribeEvent
              public void onEntityJoinWorld(EntityJoinLevelEvent event) {
                  if (event.getEntity() instanceof IronGolem golem && !event.getLevel().isClientSide()) {
                      golem.goalSelector.addGoal(3, new GoToLavaGoal(golem));
                  }
              }
              static class GoToLavaGoal extends Goal {
                  private final IronGolem golem;
                  private BlockPos lavaPos = null;
                  private static final int SEARCH_RADIUS = 16;
                  private static final int CHECK_INTERVAL = 60;
                  public GoToLavaGoal(IronGolem golem) {
                      this.golem = golem;
                      this.setFlags(EnumSet.of(Flag.MOVE));
                  }
                  @Override
                  public boolean canUse() {
                      if (golem.getTarget() != null) return false;
                      if (golem.level().getGameTime() % CHECK_INTERVAL != 0) return false;
                      lavaPos = findNearbyLava();
                      return lavaPos != null;
                  }
                  @Override
                  public boolean canContinueToUse() {
                      if (golem.getTarget() != null) return false;
                      if (lavaPos == null) return false;
                      return golem.blockPosition().distSqr(lavaPos) > 9;
                  }
                  @Override
                  public void start() {
                      if (lavaPos != null) {
                          golem.getNavigation().moveTo(lavaPos.getX() + 0.5, lavaPos.getY(), lavaPos.getZ() + 0.5, 1.0);
                      }
                  }
                  @Override
                  public void stop() {
                      golem.getNavigation().stop();
                      lavaPos = null;
                  }
                  private BlockPos findNearbyLava() {
                      BlockPos golemPos = golem.blockPosition();
                      BlockPos closest = null;
                      double closestDist = Double.MAX_VALUE;
                      for (BlockPos pos : BlockPos.betweenClosed(golemPos.offset(-SEARCH_RADIUS, -4, -SEARCH_RADIUS), golemPos.offset(SEARCH_RADIUS, 4, SEARCH_RADIUS))) {
                          if (golem.level().getBlockState(pos).is(Blocks.LAVA)) {
                              double dist = golemPos.distSqr(pos);
                              if (dist < closestDist) {
                                  closestDist = dist;
                                  closest = pos.immutable();
                              }
                          }
                      }
                      return closest;
                  }
              }
          }
          EOF

      - name: Fix build.gradle
        run: |
          cat > golemmod-forge/build.gradle << 'EOF'
          buildscript {
              repositories {
                  maven { url = 'https://maven.minecraftforge.net' }
                  mavenCentral()
              }
              dependencies {
                  classpath 'net.minecraftforge.gradle:ForgeGradle:6.+'
              }
          }
          apply plugin: 'java'
          apply plugin: 'net.minecraftforge.gradle'
          group = 'com.golemmod'
          version = '1.0.0'
          java {
              toolchain.languageVersion = JavaLanguageVersion.of(21)
          }
          minecraft {
              mappings channel: 'official', version: '1.21.11'
          }
          dependencies {
              minecraft 'net.minecraftforge:forge:1.21.11-61.1.5'
          }
          EOF

      - name: Fix mods.toml
        run: |
          cat > golemmod-forge/src/main/resources/META-INF/mods.toml << 'EOF'
          modLoader="javafml"
          loaderVersion="[61,)"
          license="MIT"
          [[mods]]
              modId="golemmod"
              version="1.0.0"
              displayName="Golem Mod"
          [[dependencies.golemmod]]
              modId="forge"
              mandatory=true
              versionRange="[61,)"
              ordering="NONE"
              side="BOTH"
          [[dependencies.golemmod]]
              modId="minecraft"
              mandatory=true
              versionRange="[1.21.11,)"
              ordering="NONE"
              side="BOTH"
          EOF

      - name: Build
        run: |
          cd golemmod-forge
          ./gradlew jar --info 2>&1 | tail -150

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: golemmod-1.21.11
          path: golemmod-forge/build/libs/*.jar
