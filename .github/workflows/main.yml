name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Forge MDK
        run: |
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/26.1-62.0.9/forge-26.1-62.0.9-mdk.zip" -o mdk.zip
          unzip mdk.zip
          cp -r forge-26.1-62.0.9/* golemmod-forge/
          chmod +x golemmod-forge/gradlew

      - name: Build
        run: |
          cd golemmod-forge
          ./gradlew jar

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: golemmod
          path: golemmod-forge/build/libs/*.jar
